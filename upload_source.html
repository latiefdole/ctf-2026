<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - Portal Berkas Digital | PT Berkas Digital Nusantara</title>
    <style>
        :root {
            --bg: #0f1923;
            --surface: #16202b;
            --border: #1e3a5f;
            --text-main: #c5d8e8;
            --text-muted: #5a7a8f;
            --accent: #4aa3df;
            --accent-2: #7ec8e3;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .brand-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .brand-logo {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            margin-bottom: 12px;
        }
        .brand-name {
            font-size: 20px;
            font-weight: 700;
            color: var(--accent-2);
            letter-spacing: 0.5px;
        }
        .brand-tagline {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 36px 40px;
            width: 100%;
            max-width: 420px;
        }
        .card-title {
            font-size: 22px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 6px;
        }
        .card-subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 28px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 11px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 7px;
            color: var(--text-main);
            font-size: 14px;
            font-family: 'Segoe UI', Arial, sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            border-color: var(--accent);
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 7px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        .btn-login:hover {
            background: var(--accent-2);
            color: var(--bg);
        }
        .alert-error {
            background: rgba(220, 60, 60, 0.12);
            border: 1px solid rgba(220, 60, 60, 0.35);
            color: #e57373;
            border-radius: 7px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 18px;
        }
        .footer-note {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: var(--text-muted);
        }
        .divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 22px 0;
        }
        .sys-info {
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
        }
    </style>
</head>
<body>
    <!-- Dev note: akun uji = karyawan / BerkasDigital2026 -->
    <div class="brand-header">
        <div class="brand-logo">&#128194;</div>
        <div class="brand-name">PT Berkas Digital Nusantara</div>
        <div class="brand-tagline">Solusi Pengelolaan Dokumen Korporat</div>
    </div>

    <div class="card">
        <div class="card-title">Masuk ke Portal</div>
        <div class="card-subtitle">Gunakan akun karyawan Anda untuk mengakses sistem berkas digital.</div>

        
        <form method="POST" action="login.php">
            <div class="form-group">
                <label for="username">Nama Pengguna</label>
                <input type="text" id="username" name="username"
                    placeholder="Masukkan nama pengguna"
                    value=""
                    autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="password">Kata Sandi</label>
                <input type="password" id="password" name="password"
                    placeholder="Masukkan kata sandi"
                    autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-login">Masuk</button>
        </form>

        <hr class="divider">
        <div class="sys-info">
            Portal Berkas Digital v2.1 &nbsp;&bull;&nbsp; Hanya untuk karyawan terdaftar
        </div>
    </div>

    <div class="footer-note">
        &copy; 2026 PT Berkas Digital Nusantara. Seluruh hak cipta dilindungi.
    </div>
</body>
</html>
